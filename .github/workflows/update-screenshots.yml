name: Update Screenshots

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'public/assets/css/**'
      - 'public/assets/js/**'
      - 'docs/**'
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screenshots:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
          
      - name: Install dependencies
        run: |
          bun install
          # Puppeteer needs to download Chrome
          bunx puppeteer browsers install chrome
          
      - name: Build TypeScript
        run: bun run build:ts
        
      - name: Start dev server
        run: |
          bun run dev &
          echo "Server PID: $!"
        env:
          PORT: 3000
          
      - name: Wait for server
        run: |
          echo "Waiting for server to be ready..."
          for i in {1..60}; do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 | grep -q "200\|302"; then
              echo "✅ Server is ready after ${i} seconds!"
              exit 0
            fi
            sleep 1
          done
          echo "❌ Server failed to start after 60 seconds"
          exit 1
          
      - name: Take screenshots
        run: |
          echo "Taking screenshots..."
          bun run scripts/take-screenshots.ts 2>&1 | tee screenshot-output.log
          exit_code=${PIPESTATUS[0]}
          if [ $exit_code -ne 0 ]; then
            echo "❌ Screenshot failed with exit code $exit_code"
            cat screenshot-output.log
            exit 1
          fi
        env:
          BASE_URL: http://localhost:3000
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: false
          
      - name: Stop server
        run: pkill -f "bun run dev" || true
        
      - name: Check for changes
        id: check_changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add public/assets/images/*.png
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi
          
      - name: Commit changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git commit -m "chore: update screenshots [skip ci]"
          git push
          
      - name: Upload screenshots artifact
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: public/assets/images/*.png
          retention-days: 7
